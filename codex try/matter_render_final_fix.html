<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matter 渲染黑底修正版</title>
  <style>
    html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
    #game { width: 100vw; height: 100vh; }
    canvas { display: block; background: transparent !important; }
  </style>
</head>
<body>
  <div id="game"></div>

  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script>
    const { Engine, Render, Runner, World, Bodies, Body } = Matter;

    const W = 420;
    const H = 680;

    const engine = Engine.create();
    const world = engine.world;

    const render = Render.create({
      element: document.getElementById('game'),
      engine,
      options: {
        width: W,
        height: H,
        wireframes: false,
        background: 'transparent',
        pixelRatio: 'auto'
      }
    });

    function transparentRender(spriteTexture, xScale = 1, yScale = 1) {
      return {
        visible: true,
        fillStyle: 'transparent',
        strokeStyle: 'transparent',
        lineWidth: 0,
        sprite: {
          texture: spriteTexture || '',
          xScale,
          yScale,
          xOffset: 0.5,
          yOffset: 0.5
        }
      };
    }

    // 墙和地面也显式透明，避免出现默认填充色
    const wallL = Bodies.rectangle(-20, H / 2, 40, H, {
      isStatic: true,
      render: transparentRender()
    });

    const wallR = Bodies.rectangle(W + 20, H / 2, 40, H, {
      isStatic: true,
      render: transparentRender()
    });

    const ground = Bodies.rectangle(W / 2, H + 20, W + 80, 40, {
      isStatic: true,
      render: transparentRender()
    });

    World.add(world, [wallL, wallR, ground]);

    // 示例水果（sprite 模式）
    // 半径 50 -> 直径 100。显示尺寸 105% => xScale/yScale 需按贴图原始像素调整。
    // 这里假设贴图是 256x256，目标显示宽 105px：scale = 105 / 256。
    const targetDisplayPx = 105;
    const texturePx = 256;
    const scale = targetDisplayPx / texturePx;

    const fruit = Bodies.circle(W / 2, 120, 50, {
      restitution: 0.2,
      friction: 0.01,
      frictionAir: 0.01,
      render: transparentRender('assets/1.png', scale, scale)
    });

    World.add(world, fruit);

    Engine.run(engine);
    Render.run(render);
    Runner.run(Runner.create(), engine);

    // 可选：保险起见，每帧确保 canvas 背景透明
    const canvas = render.canvas;
    canvas.style.background = 'transparent';
  </script>
</body>
</html>
