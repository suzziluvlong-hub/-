<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>轻量合成瓜</title>
  <style>
    :root {
      --bg1: #f8f6ef;
      --bg2: #efe7d7;
      --board: #fff9ec;
      --line: #c7b59a;
      --text: #4b3d2f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, var(--bg1), var(--bg2));
      background-image: linear-gradient(160deg, rgba(248,246,239,.72), rgba(239,231,215,.72)), url("assets/背景.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: var(--text);
    }
    .wrap {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 8px;
      gap: 8px;
      grid-template-rows: auto 1fr auto;
    }
    .hud {
      width: min(92vw, 420px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      user-select: none;
    }
    .next-box {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    #nextPreview {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(70, 50, 20, 0.18);
    }
    .stage {
      position: relative;
      width: min(92vw, 420px);
      height: min(80vh, 680px);
      overflow: visible;
    }
    .score-hud {
      position: absolute;
      left: -150px;
      top: 16px;
      z-index: 3;
      font-size: 64px;
      font-weight: 900;
      line-height: 1;
      color: #fffef2;
      text-shadow: 0 4px 0 #8a5d00, 0 0 14px rgba(0,0,0,.55);
      -webkit-text-stroke: 2px rgba(45, 28, 6, .68);
      transform-origin: left center;
      pointer-events: none;
    }
    .score-hud.pop {
      animation: score-pop .2s ease-out;
    }
    @keyframes score-pop {
      0% { transform: scale(1); }
      45% { transform: scale(1.22); }
      100% { transform: scale(1); }
    }
    #game {
      width: min(92vw, 420px);
      height: min(80vh, 680px);
      overflow: visible;
      border: 3px solid var(--line);
      border-radius: 14px;
      background: var(--board);
      touch-action: none;
      display: block;
      box-shadow: 0 8px 28px rgba(76, 53, 20, .12);
    }
    .tips {
      font-size: 12px;
      opacity: .8;
      user-select: none;
      text-align: center;
      line-height: 1.35;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #ffb74d;
      color: #35220d;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      
      <div class="next-box">下一个 <canvas id="nextPreview" width="68" height="68"></canvas></div>
      <button id="restart">重开</button>
    </div>
    <div class="stage">
      <canvas id="game" width="420" height="680"></canvas>
      <div class="score-hud" id="score">0</div>
    </div>
    <div class="tips">已启用 <code>assets/1.png ~ assets/9.png</code> 和页面背景 <code>assets/背景.jpg</code>。</div>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d', { alpha: false });
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');
    const nextPreview = document.getElementById('nextPreview');
    const npCtx = nextPreview.getContext('2d');

    const W = canvas.width;
    const H = canvas.height;
    const WALL = 8;
    const DROP_Y = 66;
    const DEAD_LINE = 106;

    const G = 0.22;
    const REST = 0.24;
    const FRICTION = 0.99;
    const AIR = 0.992;
    const WALL_FRICTION = 0.01;
    const GROUND_SPIN = 0.001;
    const COLLIDE_FRICTION = 0.012;
    const ANG_DAMP = 0.5;
    const MAX_ANG_V = 0.12;
    const SLEEP_VX = 0.028;
    const SLEEP_VY = 0.04;
    const SLEEP_AV = 0.015;
    const SLEEP_FRAMES = 22;
    const MAX_BALLS = 96;

    // 使用指数增长半径：更大的初始球 + 更明显的等级差距。
    // 在 420 宽画布中，末级半径约 160（直径约 320），约占屏宽 76%。
    const BASE_RADIUS = 36;
    const RADIUS_GROWTH = 1.157;
    const SPRITE_IDS = [0, 1, 2, 3, 4, 5, 6, 7, 8, 0, 1];
    const TYPES = SPRITE_IDS.map((spriteId, level) => [
      Math.round(BASE_RADIUS * Math.pow(RADIUS_GROWTH, level)),
      spriteId
    ]);

    const SRC_LIST = [
      'assets/1.png', 'assets/2.png', 'assets/3.png',
      'assets/4.png', 'assets/5.png', 'assets/6.png',
      'assets/7.png', 'assets/8.png', 'assets/9.png'
    ];

    const balls = new Array(MAX_BALLS);
    const typeSpriteCache = new Array(TYPES.length);
    const baseSprites = new Array(SRC_LIST.length);
    let spritesReady = false;

    let ballCount = 0;
    let nextType = 0;
    let score = 0;
    let gameOver = false;
    let pointerX = W * 0.5;
    let canDrop = true;
    let lastDropAt = 0;

    function randNext() {
      return (Math.random() * 5) | 0;
    }

    function setScore(nextScore, animate) {
      score = nextScore;
      scoreEl.textContent = score;
      if (animate) {
        scoreEl.classList.remove("pop");
        void scoreEl.offsetWidth;
        scoreEl.classList.add("pop");
      }
    }

    function removeWhiteBgToCanvas(img) {
      const cw = img.naturalWidth || img.width;
      const ch = img.naturalHeight || img.height;
      const c = document.createElement('canvas');
      c.width = cw;
      c.height = ch;
      const g = c.getContext('2d');
      g.drawImage(img, 0, 0);

      const id = g.getImageData(0, 0, cw, ch);
      const d = id.data;

      // 按四角背景色抠图，兼容纯白和浅灰底
      const p00 = 0;
      const p10 = (cw - 1) * 4;
      const p01 = ((ch - 1) * cw) * 4;
      const p11 = (((ch - 1) * cw) + (cw - 1)) * 4;
      const bgR = ((d[p00] + d[p10] + d[p01] + d[p11]) * 0.25) | 0;
      const bgG = ((d[p00 + 1] + d[p10 + 1] + d[p01 + 1] + d[p11 + 1]) * 0.25) | 0;
      const bgB = ((d[p00 + 2] + d[p10 + 2] + d[p01 + 2] + d[p11 + 2]) * 0.25) | 0;

      for (let i = 0; i < d.length; i += 4) {
        const r = d[i], gg = d[i + 1], b = d[i + 2];
        const dr = r - bgR;
        const dg = gg - bgG;
        const db = b - bgB;
        const dist = Math.sqrt(dr * dr + dg * dg + db * db);

        if (dist < 24) {
          d[i + 3] = 0;
        } else if (dist < 46) {
          // 靠近背景色的像素做羽化，避免锯齿白边
          const keep = (dist - 24) / 22;
          d[i + 3] = (d[i + 3] * (keep < 0 ? 0 : keep)) | 0;
        }
      }
      g.putImageData(id, 0, 0);

      // 裁掉透明边缘
      let minX = cw, minY = ch, maxX = -1, maxY = -1;
      for (let y = 0; y < ch; y++) {
        for (let x = 0; x < cw; x++) {
          const a = d[(y * cw + x) * 4 + 3];
          if (a > 8) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < minX || maxY < minY) {
        const empty = document.createElement('canvas');
        empty.width = 2;
        empty.height = 2;
        return empty;
      }

      const bw = maxX - minX + 1;
      const bh = maxY - minY + 1;
      const side = (bw > bh ? bw : bh) + 6;
      const out = document.createElement('canvas');
      out.width = side;
      out.height = side;
      const og = out.getContext('2d');
      const dx = ((side - bw) * 0.5) | 0;
      const dy = ((side - bh) * 0.5) | 0;
      og.drawImage(c, minX, minY, bw, bh, dx, dy, bw, bh);
      return out;
    }

    function loadSprites() {
      let left = SRC_LIST.length;
      function doneOne() {
        left--;
        if (left === 0) {
          spritesReady = true;
          // 之前可能缓存了回退圆球，加载完贴图后强制重建
          for (let i = 0; i < typeSpriteCache.length; i++) typeSpriteCache[i] = null;
          renderNextPreview();
        }
      }

      for (let i = 0; i < SRC_LIST.length; i++) {
        const img = new Image();
        img.decoding = 'async';
        img.onload = () => {
          try {
            baseSprites[i] = removeWhiteBgToCanvas(img);
          } catch (_) {
            // 个别浏览器在本地 file:// 下可能限制像素读取，回退为原图
            const raw = document.createElement('canvas');
            raw.width = img.naturalWidth || img.width;
            raw.height = img.naturalHeight || img.height;
            raw.getContext('2d').drawImage(img, 0, 0);
            baseSprites[i] = raw;
          }
          doneOne();
        };
        img.onerror = () => {
          // 读图失败时保留空位，绘制会自动回退到纯色球
          baseSprites[i] = null;
          doneOne();
        };
        img.src = encodeURI(SRC_LIST[i]);
      }
    }

    function getHeadSprite(type) {
      let cached = typeSpriteCache[type];
      if (cached) return cached;

      const t = TYPES[type];
      const r = t[0];
      const spriteId = t[1];
      const size = r * 2 + 8;
      const c = document.createElement('canvas');
      c.width = size;
      c.height = size;
      const g = c.getContext('2d');

      const base = baseSprites[spriteId];
      if (spritesReady && base) {
        g.drawImage(base, 0, 0, base.width, base.height, 2, 2, size - 4, size - 4);
      } else {
        // 回退渲染
        g.fillStyle = '#fff6df';
        g.strokeStyle = '#33281f';
        g.lineWidth = 3;
        g.beginPath();
        g.arc(size * 0.5, size * 0.5, r - 1, 0, 6.283185307179586);
        g.fill();
        g.stroke();
      }

      cached = { img: c, half: size * 0.5 };
      typeSpriteCache[type] = cached;
      return cached;
    }

    function renderNextPreview() {
      npCtx.clearRect(0, 0, nextPreview.width, nextPreview.height);
      const sp = getHeadSprite(nextType);
      const w = nextPreview.width;
      const h = nextPreview.height;
      npCtx.drawImage(sp.img, (w - sp.img.width) * 0.5, (h - sp.img.height) * 0.5);
    }

    function resetGame() {
      ballCount = 0;
      score = 0;
      gameOver = false;
      canDrop = true;
      lastDropAt = 0;
      nextType = randNext();
      setScore(0, false);
      renderNextPreview();
    }

    function makeBall(type, x, y) {
      if (ballCount >= MAX_BALLS) return;
      const t = TYPES[type];
      balls[ballCount++] = {
        x, y,
        vx: 0,
        vy: 0,
        a: 0,
        av: 0,
        r: t[0],
        type,
        mergedAt: -99,
        alive: 1
      };
    }

    function removeDead() {
      let i = 0;
      for (let j = 0; j < ballCount; j++) {
        const b = balls[j];
        if (b.alive) {
          if (i !== j) balls[i] = b;
          i++;
        }
      }
      ballCount = i;
    }

    function dropBall() {
      if (gameOver || !canDrop) return;
      const r = TYPES[nextType][0];
      let x = pointerX;
      if (x < WALL + r) x = WALL + r;
      if (x > W - WALL - r) x = W - WALL - r;
      makeBall(nextType, x, DROP_Y);
      nextType = randNext();
      renderNextPreview();
      canDrop = false;
      lastDropAt = performance.now();
    }

    function updatePhysics(now) {
      if (!canDrop && now - lastDropAt > 260) canDrop = true;

      for (let i = 0; i < ballCount; i++) {
        const b = balls[i];
        if (b.sleep) continue;

        b.vy += G;
        b.vx *= AIR;
        b.vy *= AIR;
        b.av *= ANG_DAMP;
        if (b.av > MAX_ANG_V) b.av = MAX_ANG_V;
        else if (b.av < -MAX_ANG_V) b.av = -MAX_ANG_V;
        b.a += b.av;
        b.x += b.vx;
        b.y += b.vy;

        if (b.x - b.r < WALL) {
          b.x = WALL + b.r;
          b.vx = -b.vx * REST;
          b.vy *= (1 - WALL_FRICTION);
        } else if (b.x + b.r > W - WALL) {
          b.x = W - WALL - b.r;
          b.vx = -b.vx * REST;
          b.vy *= (1 - WALL_FRICTION);
        }

        if (b.y + b.r > H - WALL) {
          b.y = H - WALL - b.r;
          if (b.vy > 0) b.vy = -b.vy * REST;
          b.vx *= (1 - WALL_FRICTION);
          const grip = b.vx * GROUND_SPIN;
          b.av += grip / (b.r * 0.3 + 1);
          b.vx -= grip * 0.6;
          if (b.vy > -0.15 && b.vy < 0.15) b.vy = 0;
        }

        if (b.y + b.r >= H - WALL - 0.35 &&
            Math.abs(b.vx) < SLEEP_VX &&
            Math.abs(b.vy) < SLEEP_VY &&
            Math.abs(b.av) < SLEEP_AV) {
          b.sleepFrames++;
          if (b.sleepFrames > SLEEP_FRAMES) {
            b.sleep = 1;
            b.vx = 0;
            b.vy = 0;
            b.av = 0;
          }
        } else {
          b.sleepFrames = 0;
        }
      }

      for (let iter = 0; iter < 2; iter++) {
        for (let i = 0; i < ballCount; i++) {
          const a = balls[i];
          if (!a.alive) continue;
          for (let j = i + 1; j < ballCount; j++) {
            const b = balls[j];
            if (!b.alive) continue;
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const rr = a.r + b.r;
            const d2 = dx * dx + dy * dy;
            if (d2 >= rr * rr || d2 === 0) continue;

            const d = Math.sqrt(d2);
            const nx = dx / d;
            const ny = dy / d;
            const overlap = rr - d;
            const half = overlap * 0.5;

            a.x -= nx * half;
            a.y -= ny * half;
            b.x += nx * half;
            b.y += ny * half;

            const rvx = b.vx - a.vx;
            const rvy = b.vy - a.vy;
            const vn = rvx * nx + rvy * ny;
            if (vn < 0) {
              if (a.sleep) { a.sleep = 0; a.sleepFrames = 0; }
              if (b.sleep) { b.sleep = 0; b.sleepFrames = 0; }

              const imp = -(1 + REST) * vn * 0.5;
              a.vx -= imp * nx;
              a.vy -= imp * ny;
              b.vx += imp * nx;
              b.vy += imp * ny;

              const tx = -ny;
              const ty = nx;
              const vt = rvx * tx + rvy * ty;
              const tImp = -vt * COLLIDE_FRICTION;
              a.vx -= tImp * tx;
              a.vy -= tImp * ty;
              b.vx += tImp * tx;
              b.vy += tImp * ty;
              a.av -= tImp / (a.r * 0.6 + 1);
              b.av += tImp / (b.r * 0.6 + 1);
              if (a.av > MAX_ANG_V) a.av = MAX_ANG_V;
              else if (a.av < -MAX_ANG_V) a.av = -MAX_ANG_V;
              if (b.av > MAX_ANG_V) b.av = MAX_ANG_V;
              else if (b.av < -MAX_ANG_V) b.av = -MAX_ANG_V;
            }

            if (a.type === b.type && a.type < TYPES.length - 1) {
              if (Math.abs(a.mergedAt - now) > 12 && Math.abs(b.mergedAt - now) > 12) {
                const nxType = a.type + 1;
                a.alive = 0;
                b.alive = 0;
                makeBall(nxType, (a.x + b.x) * 0.5, (a.y + b.y) * 0.5);
                const nb = balls[ballCount - 1];
                nb.vx = (a.vx + b.vx) * 0.35;
                nb.vy = -0.9;
                nb.av = (a.av + b.av) * 0.22;
                nb.sleep = 0;
                nb.sleepFrames = 0;
                nb.mergedAt = now;
                setScore(score + (nxType + 1) * 3, true);
              }
            }
          }
        }
        removeDead();
      }

      let danger = 0;
      for (let i = 0; i < ballCount; i++) {
        const b = balls[i];
        if (b.y - b.r < DEAD_LINE) danger++;
      }
      if (danger > 4) gameOver = true;
    }

    function draw() {
      ctx.fillStyle = '#fff9ec';
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = '#cfbaa0';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(WALL, DEAD_LINE);
      ctx.lineTo(W - WALL, DEAD_LINE);
      ctx.stroke();

      ctx.strokeStyle = '#bfa786';
      ctx.lineWidth = WALL;
      ctx.strokeRect(WALL * 0.5, WALL * 0.5, W - WALL, H - WALL);

      for (let i = 0; i < ballCount; i++) {
        const b = balls[i];
        const sp = getHeadSprite(b.type);
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.a);
        ctx.drawImage(sp.img, -sp.half, -sp.half);
        ctx.restore();
      }

      if (!gameOver) {
        const r = TYPES[nextType][0];
        let x = pointerX;
        if (x < WALL + r) x = WALL + r;
        if (x > W - WALL - r) x = W - WALL - r;

        const sp = getHeadSprite(nextType);
        ctx.globalAlpha = 0.35;
        ctx.drawImage(sp.img, x - sp.half, DROP_Y - sp.half);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = 'rgba(30,22,16,.58)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 38px "Microsoft YaHei", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('游戏结束', W * 0.5, H * 0.46);
        ctx.font = '22px "Microsoft YaHei", sans-serif';
        ctx.fillText('分数 ' + score, W * 0.5, H * 0.54);
      }
    }

    function tick(now) {
      updatePhysics(now);
      draw();
      requestAnimationFrame(tick);
    }

    function setPointer(clientX) {
      const rect = canvas.getBoundingClientRect();
      pointerX = (clientX - rect.left) * (W / rect.width);
    }

    canvas.addEventListener('mousemove', (e) => setPointer(e.clientX));
    canvas.addEventListener('mousedown', (e) => {
      setPointer(e.clientX);
      dropBall();
    });
    canvas.addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      setPointer(t.clientX);
      dropBall();
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
      const t = e.changedTouches[0];
      setPointer(t.clientX);
    }, { passive: true });

    restartBtn.addEventListener('click', resetGame);

    loadSprites();
    resetGame();
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
